<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EcoCash | Payment Successful · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #0033a0;
            --blue-dark: #002280;
            --blue-deep: #001860;
            --green: #00b050;
            --green-dark: #007d38;
            --page: #06112a;
            --surface: #0c1e3f;
            --surface2: #112350;
            --border: rgba(255,255,255,0.10);
            --border2: rgba(255,255,255,0.20);
            --text: #ffffff;
            --text2: #c8d8f0;
            --muted: #7a99c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            min-height: 100dvh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--page) 0%, var(--surface) 100%);
            overflow-x: hidden;
        }

        .topbar {
            height: 64px;
            padding: 14px max(18px, env(safe-area-inset-right)) 14px max(18px, env(safe-area-inset-left));
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 28px rgba(0,51,160,0.18);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-size: clamp(21px, 5vw, 25px);
            font-weight: 800;
            letter-spacing: -0.8px;
            text-decoration: none;
            line-height: 1;
            cursor: pointer;
            color: white;
        }

        .brand em {
            font-style: normal;
            color: var(--green);
        }

        main {
            min-height: calc(100dvh - 64px);
            padding: clamp(14px, 3vw, 28px) max(12px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            display: grid;
            place-items: center;
        }

        .success-card {
            width: min(100%, 500px);
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: clamp(18px, 5vw, 28px);
            padding: clamp(22px, 5vw, 36px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .success-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 8px;
            background: linear-gradient(90deg, var(--green), var(--green-dark));
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: rgba(0,176,80,0.2);
            border: 3px solid var(--green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto 24px;
            font-size: 50px;
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 800;
            letter-spacing: -0.9px;
            margin-bottom: 12px;
            color: var(--green);
        }

        .subtitle {
            max-width: 390px;
            margin: 0 auto 28px;
            text-align: center;
            color: var(--muted);
            font-size: clamp(13px, 3.6vw, 14px);
            line-height: 1.55;
        }

        .bundle-summary {
            background: linear-gradient(160deg, var(--blue-deep) 0%, var(--blue) 100%);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 20px;
            color: #fff;
        }

        .bs-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.55);
            margin-bottom: 10px;
        }

        .bs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .bs-item {
            background: rgba(255,255,255,0.10);
            border-radius: 10px;
            padding: 9px 12px;
        }

        .bs-item-label {
            font-size: 10px;
            color: rgba(255,255,255,0.55);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bs-item-val {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            margin-top: 2px;
            letter-spacing: -0.3px;
        }

        .bs-total {
            background: rgba(0,176,80,0.18);
            border: 1px solid rgba(0,176,80,0.35);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bs-total-label { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600; }
        .bs-total-val   { font-size: 1.25rem; font-weight: 900; color: #4ade80; letter-spacing: -0.5px; }

        .btn-primary {
            width: 100%;
            border: 0;
            border-radius: 999px;
            padding: 16px 22px;
            color: white;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,176,80,0.3);
            touch-action: manipulation;
            transition: opacity 0.18s, box-shadow 0.18s, transform 0.12s;
            margin-top: 20px;
        }

        .btn-primary:hover {
            box-shadow: 0 14px 30px rgba(0,176,80,0.36);
            transform: translateY(-1px);
        }

        .btn-primary:active { transform: translateY(0); }

        .terms {
            margin-top: 18px;
            color: var(--muted);
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
        }

        .terms a { color: var(--green); font-weight: 800; }

        @media (max-width: 520px) {
            .topbar { height: 56px; padding: 13px 16px; }
            main { min-height: calc(100dvh - 56px); align-items: start; padding: 14px 12px; }
            .success-card { padding: 24px 17px; }
            .success-icon { width: 80px; height: 80px; font-size: 40px; }
            .btn-primary { padding: 15px 18px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">Eco<em>Cash</em></a>
    </header>

    <main>
        <section class="success-card">
            <div class="success-icon">✓</div>

            <h1>Payment Successful!</h1>
            <p class="subtitle">Your data bundle has been activated and added to your EcoCash account. Enjoy your non-expiry data!</p>

            <div id="bundleSummary" class="bundle-summary">
                <div class="bs-title">Your Data Bundle</div>
                <div class="bs-grid">
                    <div class="bs-item"><div class="bs-item-label">Bundle</div><div class="bs-item-val" id="bsOffer">—</div></div>
                    <div class="bs-item"><div class="bs-item-label">Data</div><div class="bs-item-val" id="bsData">—</div></div>
                </div>
                <div class="bs-total">
                    <span class="bs-total-label">Amount Paid</span>
                    <span class="bs-total-val" id="bsPrice">$ —</span>
                </div>
            </div>

            <button class="btn-primary" onclick="window.location.href='index.html'">← Return to Home</button>

            <div class="terms">Your transaction has been securely processed. <a href="#" target="_blank" rel="noopener">View Receipt</a></div>
        </section>
    </main>

    <script>
        function loadBundleData() {
            const params = new URLSearchParams(window.location.search);
            const offer = params.get('offer');
            const data = params.get('data');
            const price = params.get('price');

            if (offer && data && price) {
                document.getElementById('bsOffer').textContent = offer;
                document.getElementById('bsData').textContent = data;
                document.getElementById('bsPrice').textContent = '$ ' + price;
            }
        }

        window.addEventListener('load', loadBundleData);
    </script>
</body>
</html>
