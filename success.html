<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a1628">
    <title>EcoCash | Success · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --eco-red: #e53935;
            --eco-blue-dark: #0a1628;
            --eco-blue: #1a3a6b;
            --eco-blue-light: #2563eb;
            --eco-accent: #3b82f6;
            --white: #ffffff;
            --light-bg: #f0f4f8;
            --text-dark: #1a1a2e;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 50%, #0f2447 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: white;
            padding: 14px 5%;
            border-bottom: 3px solid var(--eco-blue-light);
            box-shadow: 0 2px 20px rgba(10, 22, 40, 0.12);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .logo .eco { color: var(--eco-blue); }
        .logo .cash { color: var(--eco-red); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .success-container {
            background: white;
            border-radius: 20px;
            padding: 44px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(10, 22, 40, 0.3);
            text-align: center;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border: 3px solid var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 38px;
            animation: scaleIn 0.6s ease-out, pulse 2s ease-in-out infinite;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
        }

        .success-header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--success);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .success-header p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .bundle-info {
            background: linear-gradient(135deg, var(--eco-blue-light), var(--eco-blue));
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 28px;
            color: white;
            text-align: left;
        }

        .bundle-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .bundle-info-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 10px;
            font-weight: 800;
            font-size: 16px;
        }

        .btn-home {
            width: 100%;
            background: linear-gradient(135deg, var(--eco-blue-light), var(--eco-blue));
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            margin-bottom: 12px;
        }

        .btn-home:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .btn-receipt {
            width: 100%;
            background: transparent;
            color: var(--eco-blue-light);
            border: 2px solid var(--eco-blue-light);
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-receipt:hover {
            background: rgba(37, 99, 235, 0.05);
        }

        .success-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .success-footer a {
            color: var(--eco-blue-light);
            text-decoration: none;
            font-weight: 700;
        }

        .success-footer a:hover {
            text-decoration: underline;
        }

        .security-badge {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confettiFall 3s ease-out forwards;
            opacity: 0;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            main { padding: 20px 16px; }
            .success-container { padding: 28px 20px; }
            .success-header h1 { font-size: 24px; }
            .success-icon { width: 70px; height: 70px; font-size: 32px; }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html"><span class="eco">Eco</span><span class="cash">Cash</span></a>
    </header>

    <main>
        <div class="success-container">
            <div class="success-icon">&#10003;</div>

            <div class="success-header">
                <h1>Transaction Complete!</h1>
                <p>Your bundle has been activated successfully. You can start using your data right away.</p>
            </div>

            <div id="bundleInfo" class="bundle-info" style="display: none;">
                <div class="bundle-info-row">
                    <span>Bundle:</span>
                    <span id="bundleData">&mdash;</span>
                </div>
                <div class="bundle-info-row">
                    <span>Status:</span>
                    <span style="color: #86efac;">Active</span>
                </div>
                <div class="bundle-info-row">
                    <span>Amount Paid:</span>
                    <span id="bundlePrice">USD 0.00</span>
                </div>
            </div>

            <button class="btn-home" onclick="window.location.href='index.html'">&larr; Back to Home</button>
            <button class="btn-receipt" onclick="downloadReceipt()">&#128196; Download Receipt</button>

            <div class="success-footer">
                Your transaction is complete. <a href="index.html">Buy another bundle</a>
            </div>

            <div class="security-badge">
                <div class="badge">&#128274; Encrypted</div>
                <div class="badge">&#9989; Verified</div>
                <div class="badge">&#127760; Secure</div>
            </div>
        </div>
    </main>

    <!-- Confetti -->
    <div class="confetti" id="confetti"></div>

    <script>
        function loadBundleData() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            const price = params.get('price');

            if (data && price) {
                document.getElementById('bundleInfo').style.display = 'block';
                document.getElementById('bundleData').textContent = data;
                document.getElementById('bundlePrice').textContent = 'USD ' + price;
            }
        }

        function downloadReceipt() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data') || 'N/A';
            const price = params.get('price') || '0.00';
            const date = new Date().toLocaleString();
            const ref = 'ECO' + Date.now().toString().slice(-8);

            const receipt = `
========================================
         ECOCASH TRANSACTION RECEIPT
========================================

Reference: ${ref}
Date: ${date}
Status: SUCCESS

Bundle: ${data}
Amount: USD ${price}
Payment Method: EcoCash

========================================
Thank you for using EcoCash!
========================================
            `.trim();

            const blob = new Blob([receipt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `EcoCash_Receipt_${ref}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function createConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#2563eb', '#3b82f6', '#10b981', '#e53935', '#f59e0b', '#8b5cf6'];
            
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(piece);
            }

            setTimeout(() => {
                container.remove();
            }, 5000);
        }

        window.addEventListener('load', () => {
            loadBundleData();
            createConfetti();
        });
    </script>
</body>
</html>
