<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>EcoCash | Success · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --eco-primary: #003366;
            --eco-secondary: #004d99;
            --eco-accent: #0077cc;
            --eco-highlight: #00aaff;
            --eco-green: #00a651;
            --white: #ffffff;
            --light-bg: #f0f6ff;
            --text-dark: #0d1b2a;
            --text-muted: #5a6d80;
            --border: #d0dce8;
            --success: #00a651;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #003366 0%, #001a33 50%, #004d99 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: white;
            padding: 14px 5%;
            border-bottom: 3px solid var(--eco-primary);
            box-shadow: 0 2px 16px rgba(0, 51, 102, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: var(--eco-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 12px;
        }

        .logo-text { font-size: 20px; font-weight: 900; }
        .logo-text .eco { color: var(--eco-primary); }
        .logo-text .cash { color: var(--eco-green); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .success-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 26, 51, 0.4);
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 166, 81, 0.08);
            border: 3px solid var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            font-size: 36px;
            animation: scaleIn 0.5s ease-out, pulse 2s ease-in-out infinite;
        }

        @keyframes scaleIn {
            from { transform: scale(0.4); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 166, 81, 0.25); }
            50% { box-shadow: 0 0 0 14px rgba(0, 166, 81, 0); }
        }

        .success-card h1 { font-size: 24px; font-weight: 900; color: var(--success); margin-bottom: 8px; }
        .success-card .desc { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin-bottom: 24px; }

        .bundle-bar {
            background: linear-gradient(135deg, var(--eco-primary), #001a33);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            color: white;
            text-align: left;
        }

        .bundle-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 8px; }
        .bundle-row:last-child { margin-bottom: 0; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.15); font-weight: 800; font-size: 14px; }

        .btn-home {
            width: 100%;
            background: var(--eco-primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(0, 51, 102, 0.3);
            margin-bottom: 10px;
        }

        .btn-home:hover { background: var(--eco-accent); transform: translateY(-1px); }

        .btn-receipt {
            width: 100%;
            background: transparent;
            color: var(--eco-primary);
            border: 2px solid var(--eco-primary);
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-receipt:hover { background: var(--light-bg); }

        .card-footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-muted); }
        .card-footer a { color: var(--eco-accent); text-decoration: none; font-weight: 700; }

        .badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .badges span { display: flex; align-items: center; gap: 4px; }

        /* Confetti */
        .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; overflow: hidden; }
        .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall 3s ease-out forwards; opacity: 0; }

        @keyframes fall {
            0% { transform: translateY(-80px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            main { padding: 20px 14px; }
            .success-card { padding: 28px 20px; }
            .success-card h1 { font-size: 20px; }
            .success-icon { width: 68px; height: 68px; font-size: 30px; }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html">
            <div class="logo-icon">EC</div>
            <div class="logo-text"><span class="eco">Eco</span><span class="cash">Cash</span></div>
        </a>
    </header>

    <main>
        <div class="success-card">
            <div class="success-icon">&#10003;</div>
            <h1>Transaction Complete!</h1>
            <p class="desc">Your bundle has been activated successfully. You can start using your data right away.</p>

            <div id="bundleBar" class="bundle-bar" style="display:none;">
                <div class="bundle-row"><span>Bundle:</span><span id="bData">&mdash;</span></div>
                <div class="bundle-row"><span>Status:</span><span style="color:#86efac;">Active</span></div>
                <div class="bundle-row"><span>Amount Paid:</span><span id="bPrice">USD 0.00</span></div>
            </div>

            <button class="btn-home" onclick="window.location.href='index.html'">&larr; Back to Home</button>
            <button class="btn-receipt" onclick="downloadReceipt()">Download Receipt</button>

            <div class="card-footer">Transaction complete. <a href="index.html">Buy another bundle</a></div>

            <div class="badges">
                <span>&#128274; Encrypted</span>
                <span>&#9989; Verified</span>
                <span>&#127760; Secure</span>
            </div>
        </div>
    </main>

    <div class="confetti" id="confetti"></div>

    <script>
        function loadBundle() {
            const p = new URLSearchParams(window.location.search);
            const data = p.get('data'), price = p.get('price');
            if (data && price) {
                document.getElementById('bundleBar').style.display = 'block';
                document.getElementById('bData').textContent = data;
                document.getElementById('bPrice').textContent = 'USD ' + price;
            }
        }

        function downloadReceipt() {
            const p = new URLSearchParams(window.location.search);
            const data = p.get('data') || 'N/A';
            const price = p.get('price') || '0.00';
            const date = new Date().toLocaleString();
            const ref = 'ECO' + Date.now().toString().slice(-8);

            const receipt = `========================================
         ECOCASH TRANSACTION RECEIPT
========================================

Reference: ${ref}
Date: ${date}
Status: SUCCESS

Bundle: ${data}
Amount: USD ${price}
Payment Method: EcoCash

========================================
Thank you for using EcoCash!
========================================`;

            const blob = new Blob([receipt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `EcoCash_Receipt_${ref}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function createConfetti() {
            const el = document.getElementById('confetti');
            const colors = ['#003366', '#0077cc', '#00aaff', '#00a651', '#004d99', '#60a5fa'];
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                p.style.left = Math.random() * 100 + '%';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDelay = Math.random() * 2 + 's';
                p.style.animationDuration = (2 + Math.random() * 2) + 's';
                el.appendChild(p);
            }
            setTimeout(() => el.remove(), 5000);
        }

        window.addEventListener('load', () => { loadBundle(); createConfetti(); });
    </script>
</body>
</html>
