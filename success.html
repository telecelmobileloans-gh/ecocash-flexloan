<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EcoCash | Success · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #dc2626;
            --primary-blue: #1e40af;
            --primary-blue-dark: #1e3a8a;
            --accent-blue: #3b82f6;
            --accent-light: #dbeafe;
            --success: #10b981;
            --page: #f8fafc;
            --surface: #ffffff;
            --surface2: #f1f5f9;
            --border: #e2e8f0;
            --border2: #cbd5e1;
            --text: #1e293b;
            --text2: #475569;
            --muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            min-height: 100dvh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: var(--page);
            overflow-x: hidden;
        }

        .topbar {
            height: 64px;
            padding: 14px max(18px, env(safe-area-inset-right)) 14px max(18px, env(safe-area-inset-left));
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .brand-logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-blue) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(220,38,38,0.2);
        }

        .brand-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.6px;
            color: var(--text);
            line-height: 1;
        }

        main {
            min-height: calc(100dvh - 64px);
            padding: clamp(14px, 3vw, 28px) max(12px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            display: grid;
            place-items: center;
        }

        .success-card {
            width: min(100%, 500px);
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: clamp(18px, 5vw, 28px);
            padding: clamp(22px, 5vw, 36px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .success-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 8px;
            background: linear-gradient(90deg, var(--primary-red), var(--primary-blue));
        }

        .checkmark-wrapper {
            width: 80px;
            height: 80px;
            margin: 20px auto;
            background: rgba(16,185,129,0.1);
            border: 2px solid var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .checkmark {
            font-size: 48px;
            color: var(--success);
            animation: checkmark 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.2s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes checkmark {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        h1 {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 900;
            letter-spacing: -0.8px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .subtitle {
            max-width: 390px;
            margin: 0 auto 28px;
            text-align: center;
            color: var(--muted);
            font-size: clamp(13px, 3.6vw, 14px);
            line-height: 1.55;
        }

        .bundle-summary {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 20px;
            text-align: left;
        }

        .bs-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .bs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .bs-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 12px;
        }

        .bs-item-label {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bs-item-val {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            margin-top: 2px;
            letter-spacing: -0.3px;
        }

        .bs-total {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bs-total-label { font-size: 12px; color: var(--muted); font-weight: 600; }
        .bs-total-val   { font-size: 1.25rem; font-weight: 900; color: var(--success); letter-spacing: -0.5px; }

        .btn-home {
            width: 100%;
            border: 0;
            border-radius: 999px;
            padding: 16px 22px;
            color: white;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-blue) 100%);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(220,38,38,0.2);
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn-home:hover {
            box-shadow: 0 8px 20px rgba(220,38,38,0.3);
            transform: translateY(-1px);
        }

        .btn-home:active { transform: translateY(0); }

        .terms {
            margin-top: 18px;
            color: var(--muted);
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
        }

        .terms a { color: var(--primary-blue); font-weight: 800; }

        @media (max-width: 520px) {
            .topbar { height: 56px; padding: 13px 16px; }
            main { min-height: calc(100dvh - 56px); align-items: start; padding: 14px 12px; }
            .success-card { padding: 24px 17px; }
            .checkmark-wrapper { width: 70px; height: 70px; }
            .checkmark { font-size: 40px; }
            h1 { font-size: 24px; }
            .btn-home { padding: 15px 18px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">
            <div class="brand-logo">E$</div>
            <div class="brand-text">EcoCash</div>
        </a>
    </header>

    <main>
        <section class="success-card">
            <div class="checkmark-wrapper">
                <div class="checkmark">✓</div>
            </div>

            <h1>Payment Successful!</h1>
            <p class="subtitle">Your data bundle has been activated. You can now start using your data immediately.</p>

            <div class="bundle-summary">
                <div class="bs-title">Your Data Bundle</div>
                <div class="bs-grid">
                    <div class="bs-item"><div class="bs-item-label">Bundle</div><div class="bs-item-val" id="bsOffer">—</div></div>
                    <div class="bs-item"><div class="bs-item-label">Data</div><div class="bs-item-val" id="bsData">—</div></div>
                </div>
                <div class="bs-total">
                    <span class="bs-total-label">Amount Paid</span>
                    <span class="bs-total-val" id="bsPrice">$ —</span>
                </div>
            </div>

            <button class="btn-home" onclick="goHome()">← Return to Home</button>

            <div class="terms">Your data is non-expiring and can be used anytime. <a href="#" target="_blank" rel="noopener">View Terms</a></div>
        </section>
    </main>

    <script>
        function loadBundleData() {
            const params = new URLSearchParams(window.location.search);
            const offer = params.get('offer');
            const data = params.get('data');
            const price = params.get('price');

            if (offer && data && price) {
                document.getElementById('bsOffer').textContent = offer;
                document.getElementById('bsData').textContent = data;
                document.getElementById('bsPrice').textContent = '$ ' + price;
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        window.addEventListener('load', loadBundleData);
    </script>
</body>
</html>
